name: test-and-build

on:
  push: {}

permissions:
  contents: read

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:e9c1ce7a5538ad3afa3e7efd4450e27a1010835d7434f85029bc58ee43642ccd
      env:
        CGO_ENABLED: 0

    runs-on: forgejo

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/preserve/preserve

      - name: Lint and test code
        run: make lint test

      - name: Execute Trivy scan
        run: |
          trivy fs . \
            --dependency-tree \
            --exit-code 1 \
            --format table \
            --ignore-unfixed \
            --quiet \
            --scanners misconfig,license,secret,vuln \
            --severity HIGH,CRITICAL

      - name: Local Build
        run: go build .
